<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>跳转中...</title>
</head>
<body>
  <button onclick="openBlank()">no</button>
  <script>
    // 这是 mc 网站的完整 HTML 代码（做了转义处理，确保能正确写入新窗口）
    const mcHTML = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>验证身份</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .box {
            text-align: center;
            background: #333;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input {
            padding: 12px;
            border: none;
            border-radius: 4px;
            width: 200px;
            margin-bottom: 20px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        .fullscreen-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 9999;
            background: white;
        }
    </style>
</head>
<body>
<div id="login-box" class="box">
    <h2>请输入访问密码</h2>
    <input type="password" id="pw" placeholder="在此输入密码..." autocomplete="off">
    <br>
    <button onclick="verify()">进入网页</button>
</div>
<script>
    function verify() {
        const pw = document.getElementById('pw').value;
        const links = {
            "fakyou": "https://andy78gg.github.io/dadish/",
        };
        if (links[pw]) {
            const targetUrl = links[pw];
            document.body.innerHTML = '<iframe src=\"' + targetUrl + '\" class=\"fullscreen-iframe\"></iframe>';
            document.title = "Google Classroom";
        } else {
            alert("密码错误，访问被拒绝！");
        }
    }
    document.getElementById('pw').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') verify();
    });
<\/script>
</body>
</html>`;

    function openBlank() {
      // 打开一个真正的 about:blank 窗口
      const blankWin = window.open('about:blank', '_blank');
      if (blankWin) {
        blankWin.document.open();
        blankWin.document.write(mcHTML);
        blankWin.document.close();
        // 将当前页面也替换为 about:blank（原标签页变空白）
        window.location.replace('about:blank');
      } else {
        alert('弹窗被浏览器拦截，请允许弹窗后刷新页面重试。');
      }
    }

    // 自动尝试打开
    window.addEventListener('load', function() {
      // 延迟一点点，避免被某些浏览器误判
      setTimeout(openBlank, 100);
    });
  </script>
</body>
</html>
